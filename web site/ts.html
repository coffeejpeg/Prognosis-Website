<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ftt</title>
    <style>
        .footer {
    background-color: #000;
    color: #fff;
    padding: 40px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    position: relative;
    z-index: 100;
    min-height: 120px;
}

.footer-left {
    display: flex;
    gap: 30px;
}

.footer-left a {
    color: #fff;
    text-decoration: none;
    transition: color 0.3s ease;
}

.footer-left a:hover {
    color: var(--accent);
}

.footer-right {
    text-align: right;
}

.footer-right p {
    margin: 5px 0;
    font-size: 12px;
    color: #aaa;
}
    </style>
</head>
<body>
    <footer class="footer">
        <div class="footer-left">
            <a href="#">Termos</a>
            <a href="#">Política de Privacidade</a>
        </div>
        <div class="footer-right">
            <p>All rights reserved herein are the properties of their respective owners.</p>
            <p>&copy; KAMP STUDIOS</p>
        </div>
    </footer>
</body>
</html>
